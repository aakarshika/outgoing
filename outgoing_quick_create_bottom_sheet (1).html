
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body-wrap{display:block;}
  .screen{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:0;overflow:hidden;min-height:520px;position:relative;}
  .bg-app{padding:2rem 1.5rem 0;opacity:0.35;}
  .bg-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
  .bg-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#D85A30;}
  .bg-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);height:80px;margin-bottom:10px;}

  .sheet{background:var(--color-background-primary);border-radius:16px 16px 0 0;border-top:0.5px solid var(--color-border-tertiary);padding:0 1.25rem 1.5rem;margin-top:-20px;}
  .sheet-handle{width:36px;height:4px;background:var(--color-border-secondary);border-radius:999px;margin:12px auto 16px;}
  .sheet-question{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--color-text-primary);margin-bottom:1.25rem;letter-spacing:-0.3px;}

  .field-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--color-text-secondary);margin-bottom:6px;}
  .field-input{width:100%;padding:11px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--color-text-primary);background:var(--color-background-primary);margin-bottom:14px;}
  .field-input::placeholder{color:var(--color-text-tertiary);}
  .field-input:focus{outline:none;border-color:#D85A30;}

  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .field-half{display:flex;flex-direction:column;}

  .price-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .toggle-group{display:flex;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden;}
  .toggle-opt{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:9px 18px;cursor:pointer;color:var(--color-text-secondary);background:var(--color-background-primary);}
  .toggle-opt.on{background:#D85A30;color:#fff;}
  .price-input{flex:1;padding:9px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--color-text-primary);background:var(--color-background-primary);}

  .cat-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
  .cat-chip{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 13px;border-radius:999px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;}
  .cat-chip.on{background:#D85A30;border-color:#D85A30;color:#fff;}

  .needs-wrap{background:#FAEEDA;border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:16px;}
  .needs-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:#854F0B;margin-bottom:6px;}
  .needs-input{width:100%;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;color:#412402;outline:none;}
  .needs-input::placeholder{color:#BA7517;}

  .sheet-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .btn-plan{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:13px;border-radius:999px;border:1.5px solid var(--color-border-primary);background:transparent;color:var(--color-text-primary);cursor:pointer;text-align:center;}
  .btn-post{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:13px;border-radius:999px;border:none;background:#D85A30;color:#fff;cursor:pointer;text-align:center;}
</style>

<div class="screen">
  <div class="bg-app">
    <div class="bg-nav">
      <div class="bg-logo">outgoing</div>
      <div style="width:32px;height:32px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);"></div>
    </div>
    <div class="bg-card"></div>
    <div class="bg-card" style="height:60px;"></div>
  </div>

  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-question">What's happening?</div>

    <div class="field-label">Event name</div>
    <input class="field-input" placeholder="Rooftop thing, art night, just a hang..." value="Rooftop Vinyl Night" />

    <div class="field-row">
      <div class="field-half">
        <div class="field-label">Date & time</div>
        <input class="field-input" style="margin-bottom:0;" placeholder="Saturday evening" value="Sat 15 Mar · 8pm" />
      </div>
      <div class="field-half">
        <div class="field-label">Location</div>
        <input class="field-input" style="margin-bottom:0;" placeholder="Address or 'Online'" value="Indiranagar, Bengaluru" />
      </div>
    </div>
    <div style="margin-bottom:14px;"></div>

    <div class="field-label">Category</div>
    <div class="cat-row">
      <div class="cat-chip on">Music</div>
      <div class="cat-chip">Food</div>
      <div class="cat-chip">Outdoors</div>
      <div class="cat-chip">Arts</div>
      <div class="cat-chip">Tech</div>
      <div class="cat-chip">Sports</div>
      <div class="cat-chip">Comedy</div>
      <div class="cat-chip">Wellness</div>
    </div>

    <div class="field-label">Price</div>
    <div class="price-row">
      <div class="toggle-group">
        <div class="toggle-opt">Free</div>
        <div class="toggle-opt on">Paid</div>
      </div>
      <input class="price-input" placeholder="₹0" value="₹350" />
    </div>

    <div class="needs-wrap">
      <div class="needs-label">What do you need help with?</div>
      <input class="needs-input" placeholder="a DJ, someone to bring snacks, a photographer..." value="a DJ and someone to bring the speakers" />
    </div>

    <div class="sheet-btns">
      <div class="btn-plan">Plan it out &#8594;</div>
      <div class="btn-post">Post now</div>
    </div>
  </div>
</div>
